name: Bug report
description: Report a reproducible problem with FlowGuard
title: "Bug: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Commands/config needed to reproduce the issue.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        OS:
        Architecture:
        FlowGuard version:
        vnStat version:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant output from `flowguard doctor`, `flowguard status`, and service logs. Remove secrets first.
      render: text

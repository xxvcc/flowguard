name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: true
      - name: Format check
        run: |
          test -z "$(find . -name '*.go' -print0 | xargs -0 gofmt -l)"
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Shell syntax
        run: sh -n scripts/install.sh

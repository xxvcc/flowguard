name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    env:
      FLOWGUARD_MINISIGN_SECRET_KEY: ${{ secrets.FLOWGUARD_MINISIGN_SECRET_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Build artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist build
          LDFLAGS="-s -w -X main.version=${GITHUB_REF_NAME} -X main.commit=${GITHUB_SHA}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="$LDFLAGS" -o build/flowguard ./cmd/flowguard
          tar -C build -czf dist/flowguard_linux_amd64.tar.gz flowguard
          rm -f build/flowguard
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="$LDFLAGS" -o build/flowguard ./cmd/flowguard
          tar -C build -czf dist/flowguard_linux_arm64.tar.gz flowguard
          rm -f build/flowguard
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 go build -trimpath -ldflags="$LDFLAGS" -o build/flowguard ./cmd/flowguard
          tar -C build -czf dist/flowguard_linux_armv7.tar.gz flowguard
          (cd dist && sha256sum flowguard_*.tar.gz > checksums.txt)
      - name: Sign checksums
        if: ${{ env.FLOWGUARD_MINISIGN_SECRET_KEY != '' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y minisign
          cleanup() {
            rm -f minisign.key
          }
          trap cleanup EXIT
          printf '%s' "$FLOWGUARD_MINISIGN_SECRET_KEY" > minisign.key
          chmod 600 minisign.key
          minisign -S -W -m dist/checksums.txt -s minisign.key -x dist/checksums.txt.minisig
      - name: Publish GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: dist/*
          generate_release_notes: true

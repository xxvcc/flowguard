name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: true
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Build artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist build
          LDFLAGS="-s -w -X main.version=${GITHUB_REF_NAME} -X main.commit=${GITHUB_SHA}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="$LDFLAGS" -o build/flowguard ./cmd/flowguard
          tar -C build -czf dist/flowguard_linux_amd64.tar.gz flowguard
          rm -f build/flowguard
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="$LDFLAGS" -o build/flowguard ./cmd/flowguard
          tar -C build -czf dist/flowguard_linux_arm64.tar.gz flowguard
          rm -f build/flowguard
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 go build -trimpath -ldflags="$LDFLAGS" -o build/flowguard ./cmd/flowguard
          tar -C build -czf dist/flowguard_linux_armv7.tar.gz flowguard
          (cd dist && sha256sum flowguard_*.tar.gz > checksums.txt)
      - name: Publish GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: dist/*
          generate_release_notes: true
